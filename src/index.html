<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Orange TV Remote</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0f;
        --remote: #141418;
        --surface: #1c1c22;
        --border: #2a2a35;
        --orange: #ff6b00;
        --orange2: #ff8c00;
        --glow: rgba(255, 107, 0, 0.35);
        --text: #e8e8f0;
        --muted: #555566;
        --btn: #1e1e26;
        --btn-h: #26262f;
        --radius: 12px;
      }

      body {
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100svh;
        padding: 24px 16px 48px;
        font-family: "Rajdhani", sans-serif;
        overflow-x: hidden;
      }

      /* Ambient glow behind remote */
      body::before {
        content: "";
        position: fixed;
        top: -100px;
        left: 50%;
        transform: translateX(-50%);
        width: 400px;
        height: 400px;
        background: radial-gradient(
          circle,
          rgba(255, 107, 0, 0.08) 0%,
          transparent 70%
        );
        pointer-events: none;
        z-index: 0;
      }

      .remote {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 340px;
        background: linear-gradient(165deg, #1a1a22 0%, #111115 100%);
        border: 1px solid var(--border);
        border-radius: 32px;
        padding: 28px 20px 36px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 40px 80px rgba(0, 0, 0, 0.8),
          0 0 60px rgba(255, 107, 0, 0.05);
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
        padding: 0 4px;
      }

      .brand {
        font-size: 13px;
        font-family: "Share Tech Mono", monospace;
        color: var(--muted);
        letter-spacing: 2px;
        text-transform: uppercase;
      }

      .brand span {
        color: var(--orange);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--orange);
        box-shadow: 0 0 8px var(--orange);
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          box-shadow: 0 0 8px var(--orange);
        }
        50% {
          opacity: 0.4;
          box-shadow: 0 0 3px var(--orange);
        }
      }

      /* Sections */
      .section {
        margin-bottom: 20px;
      }

      .section-label {
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--muted);
        font-family: "Share Tech Mono", monospace;
        margin-bottom: 10px;
        padding-left: 2px;
      }

      /* Divider */
      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--border),
          transparent
        );
        margin: 20px 0;
      }

      /* ─── BUTTONS ─── */
      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--btn);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "Rajdhani", sans-serif;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        transition:
          background 0.12s,
          transform 0.08s,
          box-shadow 0.12s,
          border-color 0.12s;
        position: relative;
        overflow: hidden;
      }

      .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0);
        transition: background 0.1s;
      }

      .btn:active {
        transform: scale(0.93);
        background: var(--btn-h);
        box-shadow: 0 0 20px var(--glow);
        border-color: var(--orange);
      }

      .btn:active::after {
        background: rgba(255, 107, 0, 0.08);
      }

      /* Feedback flash */
      .btn.flash {
        border-color: var(--orange);
        box-shadow: 0 0 18px var(--glow);
      }

      /* Power button */
      .btn-power {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(145deg, #1e1e28, #141418);
        border: 2px solid var(--border);
        font-size: 22px;
      }

      .btn-power:active {
        background: linear-gradient(145deg, #ff6b00, #cc4400);
        border-color: var(--orange2);
        box-shadow: 0 0 30px rgba(255, 107, 0, 0.5);
      }

      /* Orange accent buttons */
      .btn-accent {
        background: linear-gradient(145deg, #1e2018, #141410);
        border-color: rgba(255, 107, 0, 0.3);
        color: var(--orange);
      }

      /* Nav cluster */
      .nav-cluster {
        display: grid;
        grid-template-columns: 60px 80px 60px;
        grid-template-rows: 50px 50px 50px;
        gap: 6px;
        justify-content: center;
      }

      .nav-cluster .btn-up {
        grid-column: 2;
        grid-row: 1;
        border-radius: 14px 14px 4px 4px;
      }
      .nav-cluster .btn-left {
        grid-column: 1;
        grid-row: 2;
        border-radius: 14px 4px 4px 14px;
      }
      .nav-cluster .btn-ok {
        grid-column: 2;
        grid-row: 2;
        border-radius: 50%;
        width: 80px;
        height: 80px;
        font-size: 13px;
        letter-spacing: 2px;
        background: linear-gradient(145deg, #222230, #16161e);
        border: 2px solid rgba(255, 107, 0, 0.4);
        color: var(--orange);
        box-shadow: 0 0 20px rgba(255, 107, 0, 0.1);
        margin: -15px 0;
        z-index: 2;
      }
      .nav-cluster .btn-ok:active {
        background: linear-gradient(145deg, #ff6b00, #cc4400);
        color: white;
      }
      .nav-cluster .btn-right {
        grid-column: 3;
        grid-row: 2;
        border-radius: 4px 14px 14px 4px;
      }
      .nav-cluster .btn-down {
        grid-column: 2;
        grid-row: 3;
        border-radius: 4px 4px 14px 14px;
      }

      /* Row layouts */
      .row {
        display: flex;
        gap: 8px;
        justify-content: center;
      }

      .row .btn {
        flex: 1;
        height: 46px;
      }

      /* Top row: power + mute */
      .top-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px;
        margin-bottom: 24px;
      }

      /* Volume/Channel grid */
      .vc-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .vc-col {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .vc-col .btn {
        height: 44px;
      }

      .vc-label {
        text-align: center;
        font-size: 9px;
        letter-spacing: 2px;
        color: var(--muted);
        font-family: "Share Tech Mono", monospace;
        margin-bottom: 4px;
      }

      /* Playback */
      .playback-row {
        display: flex;
        gap: 6px;
        justify-content: center;
      }

      .playback-row .btn {
        flex: 1;
        height: 44px;
        font-size: 18px;
      }

      /* Numpad */
      .numpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .numpad .btn {
        height: 52px;
        font-size: 20px;
        font-weight: 700;
      }

      .numpad .btn-zero {
        grid-column: 2;
      }

      /* Feedback toast */
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(60px);
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: "Share Tech Mono", monospace;
        font-size: 12px;
        padding: 8px 20px;
        border-radius: 99px;
        pointer-events: none;
        transition:
          transform 0.25s ease,
          opacity 0.25s ease;
        opacity: 0;
        z-index: 999;
        white-space: nowrap;
      }

      #toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      #toast.ok {
        border-color: var(--orange);
        color: var(--orange);
      }
      #toast.error {
        border-color: #e05;
        color: #e05;
      }
    </style>
  </head>
  <body>
    <div class="remote">
      <!-- Header -->
      <div class="header">
        <div class="brand"><span>Orange</span> TV</div>
        <div class="status-dot"></div>
      </div>

      <!-- Power + Mute -->
      <div class="top-row">
        <button class="btn btn-power" data-key="power" title="Power">⏻</button>
        <div style="display: flex; gap: 10px">
          <button
            class="btn btn-accent"
            data-key="menu"
            style="
              width: 70px;
              height: 40px;
              border-radius: 10px;
              font-size: 12px;
            "
          >
            MENU
          </button>
          <button
            class="btn btn-accent"
            data-key="back"
            style="
              width: 70px;
              height: 40px;
              border-radius: 10px;
              font-size: 12px;
            "
          >
            ← BACK
          </button>
        </div>
        <button
          class="btn btn-accent"
          data-key="mute"
          style="width: 50px; height: 50px; border-radius: 50%; font-size: 20px"
        >
          🔇
        </button>
      </div>

      <div class="divider"></div>

      <!-- Navigation -->
      <div class="section">
        <div class="section-label">Navigation</div>
        <div class="nav-cluster">
          <button class="btn btn-up" data-key="up">▲</button>
          <button class="btn btn-left" data-key="left">◀</button>
          <button class="btn btn-ok" data-key="ok">OK</button>
          <button class="btn btn-right" data-key="right">▶</button>
          <button class="btn btn-down" data-key="down">▼</button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Volume & Channel -->
      <div class="section">
        <div class="vc-grid">
          <div class="vc-col">
            <div class="vc-label">VOLUME</div>
            <button class="btn" data-key="vol_up">VOL +</button>
            <button class="btn" data-key="vol_down">VOL −</button>
          </div>
          <div class="vc-col">
            <div class="vc-label">CHAÎNE</div>
            <button class="btn" data-key="ch_up">CH +</button>
            <button class="btn" data-key="ch_down">CH −</button>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Playback -->
      <div class="section">
        <div class="section-label">Lecture</div>
        <div class="playback-row">
          <button class="btn" data-key="rewind">⏮</button>
          <button class="btn btn-accent" data-key="play">▶⏸</button>
          <button class="btn" data-key="stop">⏹</button>
          <button class="btn" data-key="forward">⏭</button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Numpad -->
      <div class="section">
        <div class="section-label">Chiffres</div>
        <div class="numpad">
          <button class="btn" data-key="n1">1</button>
          <button class="btn" data-key="n2">2</button>
          <button class="btn" data-key="n3">3</button>
          <button class="btn" data-key="n4">4</button>
          <button class="btn" data-key="n5">5</button>
          <button class="btn" data-key="n6">6</button>
          <button class="btn" data-key="n7">7</button>
          <button class="btn" data-key="n8">8</button>
          <button class="btn" data-key="n9">9</button>
          <button class="btn btn-zero" data-key="n0">0</button>
        </div>
      </div>
    </div>

    <!-- Toast feedback -->
    <div id="toast"></div>

    <script>
      const toast = document.getElementById("toast");
      let toastTimer;

      function showToast(msg, type = "ok") {
        toast.textContent = msg;
        toast.className = "show " + type;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.className = "";
        }, 1500);
      }

      const labels = {
        power: "Power",
        ok: "OK",
        up: "▲",
        down: "▼",
        left: "◀",
        right: "▶",
        back: "Retour",
        menu: "Menu",
        vol_up: "Vol +",
        vol_down: "Vol −",
        mute: "Mute",
        ch_up: "CH +",
        ch_down: "CH −",
        play: "Play",
        pause: "Pause",
        stop: "Stop",
        forward: "Avance",
        rewind: "Retour",
        n0: "0",
        n1: "1",
        n2: "2",
        n3: "3",
        n4: "4",
        n5: "5",
        n6: "6",
        n7: "7",
        n8: "8",
        n9: "9",
      };

      document.querySelectorAll(".btn[data-key]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const key = btn.dataset.key;
          btn.classList.add("flash");
          setTimeout(() => btn.classList.remove("flash"), 300);

          try {
            const res = await fetch(`/press/${key}`, { method: "POST" });
            const text = await res.text();
            if (text === "ok") {
              showToast(labels[key] || key, "ok");
            } else {
              showToast("Erreur", "error");
            }
          } catch {
            showToast("Hors ligne", "error");
          }
        });
      });
    </script>
  </body>
</html>
